# Agent type definitions - add new agents here instead of modifying code
# Each agent type maps to an adapter class that handles execution

agents:
  web_worker:
    adapter: "web_worker"
    description: "HTTP-based web scraping, search, and content extraction"
    description_zh: "基于 HTTP 的网页抓取、搜索与内容提取"
    capabilities:
      - web_scraping
      - search
      - content_extraction
    max_parallelism: 3
    risk_level: "low"

  browser_agent:
    adapter: "browser_agent"
    description: "Interactive browser automation with vision capabilities"
    description_zh: "支持视觉感知的交互式浏览器自动化"
    capabilities:
      - browser_interaction
      - form_fill
      - vision
      - screenshot
    max_parallelism: 1
    risk_level: "medium"

  file_worker:
    adapter: "file_worker"
    description: "File read/write, report generation, data export"
    description_zh: "文件读写、报告生成、数据导出"
    capabilities:
      - file_read
      - file_write
      - report_generation
    max_parallelism: 5
    risk_level: "medium"

  system_worker:
    adapter: "system_worker"
    description: "System command execution, screenshots, keyboard/mouse control"
    description_zh: "系统命令执行、截图、键盘鼠标控制"
    capabilities:
      - system_command
      - screenshot
      - input_control
    max_parallelism: 1
    risk_level: "high"

  terminal_worker:
    adapter: "terminal_worker"
    description: "Execute shell commands, read/write/edit files, and search file contents or paths"
    description_zh: "执行 Shell 命令、文件读写编辑、文件搜索（glob/grep）"
    capabilities:
      - shell_execution
      - file_read
      - file_write
      - file_search
    max_parallelism: 1
    risk_level: "medium"

  enhanced_web_worker:
    adapter: "enhanced_web_worker"
    description: "Enhanced web extraction with three-layer perception for complex or dynamic pages"
    description_zh: "三层感知架构的增强版网页提取，适合复杂或动态页面"
    capabilities:
      - web_scraping
      - content_extraction
      - enhanced_perception
    max_parallelism: 2
    risk_level: "low"

  api_worker:
    adapter: "api_worker"
    description: "Call external HTTP APIs with structured request/response handling"
    description_zh: "调用外部 HTTP API，支持 GET/POST/PUT/DELETE 等方法"
    capabilities:
      - http_request
      - external_api
      - rest_api
    max_parallelism: 4
    risk_level: "medium"

  coordinator:
    adapter: "coordinator"
    description: "Coordinator agent that decomposes complex tasks into parallel subagents"
    description_zh: "协调器 Agent，将复杂任务拆分为多个子 Agent 并行执行后汇总"
    capabilities:
      - task_decomposition
      - parallel_coordination
      - result_synthesis
    max_parallelism: 1
    risk_level: "low"

  mcp_handler:
    adapter: "mcp_adapter"
    description: "Execute tools via MCP (Model Context Protocol) servers"
    description_zh: "通过 MCP 协议调用外部工具服务（数据库、IM、API 等）"
    capabilities:
      - mcp_tools
      - external_api
    max_parallelism: 2
    risk_level: "medium"
